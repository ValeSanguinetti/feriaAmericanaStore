<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;

<body class="bg-background text-on-background min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-margin-desktop py-section-padding">
<div class="w-full max-w-[480px] bg-surface-container-lowest p-stack-lg border border-outline-variant shadow-sm transition-all duration-300">
<div class="text-center mb-stack-lg">
<h1 class="text-zinc-900 font-black tracking-tighter text-display-xl uppercase mb-base">FERIA AMERICANA</h1>
<p class="font-body-md text-on-surface-variant tracking-tight uppercase">Ingresa tus credenciales para continuar</p>
</div>
<form class="space-y-stack-md">
<div class="space-y-base">
<label class="font-label-sm uppercase text-on-surface-variant block" for="email">Correo electrónico</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-white border border-outline-variant text-body-md focus:border-on-surface focus:ring-0 transition-colors duration-200 outline-none" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="font-label-sm uppercase text-on-surface-variant block" for="password">Contraseña</label>
<a class="font-label-sm uppercase text-primary-container hover:underline decoration-1" href="#">¿Olvidaste?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-4 py-3 bg-white border border-outline-variant text-body-md focus:border-on-surface focus:ring-0 transition-colors duration-200 outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center space-x-base py-base">
<input class="w-4 h-4 text-primary-container border-outline-variant focus:ring-0 rounded-sm" id="remember" type="checkbox"/>
<label class="font-label-md text-on-surface-variant" for="remember">Recordarme</label>
</div>
<div class="pt-base space-y-stack-sm">
<button class="w-full bg-primary-container text-on-primary py-4 px-6 font-label-md uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all duration-300" type="submit">
                        Iniciar sesión
                    </button>
<button class="w-full bg-transparent border border-on-surface text-on-surface py-4 px-6 font-label-md uppercase tracking-widest hover:bg-surface-variant active:scale-[0.98] transition-all duration-300" type="button">
                        Crear cuenta
                    </button>
</div>
</form>
<div class="mt-stack-lg pt-stack-md border-t border-outline-variant">
<div class="flex items-center justify-center gap-stack-md">
<span class="font-label-sm text-on-surface-variant uppercase">O continúa con</span>
</div>
<div class="flex gap-gutter mt-stack-sm">
<button class="flex-1 border border-outline-variant py-3 flex justify-center items-center hover:bg-surface-container-low transition-colors duration-300">
<span class="material-symbols-outlined text-on-surface" data-icon="brand_family">brand_family</span>
</button>
<button class="flex-1 border border-outline-variant py-3 flex justify-center items-center hover:bg-surface-container-low transition-colors duration-300">
<span class="material-symbols-outlined text-on-surface" data-icon="alternate_email">alternate_email</span>
</button>
</div>
</div>
</div>
</main>
<footer class="w-full py-16 bg-zinc-50 border-t border-zinc-200 flex flex-col md:flex-row justify-between items-center px-16 gap-8">
<div class="text-lg font-bold text-zinc-900 uppercase tracking-widest">FERIA AMERICANA</div>
<div class="flex flex-wrap justify-center gap-stack-md">
<a class="font-manrope text-[10px] uppercase tracking-widest text-zinc-400 hover:text-red-900 transition-all duration-300" href="#">Envíos</a>
<a class="font-manrope text-[10px] uppercase tracking-widest text-zinc-400 hover:text-red-900 transition-all duration-300" href="#">Devoluciones</a>
<a class="font-manrope text-[10px] uppercase tracking-widest text-zinc-400 hover:text-red-900 transition-all duration-300" href="#">Privacidad</a>
<a class="font-manrope text-[10px] uppercase tracking-widest text-zinc-400 hover:text-red-900 transition-all duration-300" href="#">Contacto</a>
<a class="font-manrope text-[10px] uppercase tracking-widest text-zinc-400 hover:text-red-900 transition-all duration-300" href="#">Sustentabilidad</a>
</div>

        </div>
</footer>
