<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation (Shell suppressed for Transactional Flow, only showing brand anchor) -->
<header class="fixed top-0 w-full z-50 bg-stone-50/80 backdrop-blur-xl h-20 flex items-center justify-center">
<div class="text-2xl font-bold tracking-tighter text-stone-900 font-headline">L'ATELIER</div>

<div class="bg-surface-container-lowest p-8 md:p-12 rounded-xl ambient-shadow flex flex-col gap-8">

<p class="text-on-surface-variant text-sm font-body">Enter your details to access your curated collection.</p>
</div>
<form class="flex flex-col gap-6">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="text-[0.75rem] uppercase tracking-widest font-label font-medium text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<input class="w-full bg-surface-container-high border-none rounded-lg py-3.5 px-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-secondary transition-all outline-none" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-[0.75rem] uppercase tracking-widest font-label font-medium text-on-surface-variant" for="password">Password</label>
<a class="text-[0.7rem] uppercase tracking-widest font-label text-secondary hover:text-secondary-dim transition-colors" href="#">Forgot password</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-high border-none rounded-lg py-3.5 px-4 text-on-surface placeholder:text-outline focus:ring-1 focus:ring-secondary transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- CTA Actions -->
<div class="flex flex-col gap-4 mt-2">
<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-headline font-semibold text-sm hover:bg-primary-dim active:opacity-70 transition-all duration-200 uppercase tracking-wider" type="submit">
                            Login
                        </button>
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-[0.65rem] uppercase tracking-[0.2em] text-outline-variant font-label">Or</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<button class="w-full bg-secondary-container text-on-secondary-container py-4 rounded-lg font-headline font-semibold text-sm hover:opacity-80 active:opacity-70 transition-all duration-200 uppercase tracking-wider" type="button">
                            Create account
                        </button>
</div>
</form>
<!-- Social Proof / Aesthetic Anchor -->
